name: Load demo posts

# Одноразовая заливка выборки материалов в демо-базу Neon из облака.
# Нужна, потому что с машины разработчика крупные записи в Neon теряются
# (MTU-blackhole в локальной сети). Ранер Azure имеет чистый путь до Neon.
# Запуск вручную: Actions → Load demo posts → Run workflow.
# Строка подключения — в секрете репозитория DEMO_DB_URL.

on:
  workflow_dispatch:

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply posts SQL
        env:
          DB_URL: ${{ secrets.DEMO_DB_URL }}
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f .demo/posts.sql

      - name: Verify counts
        env:
          DB_URL: ${{ secrets.DEMO_DB_URL }}
        run: |
          psql "$DB_URL" -c 'select count(*) as posts, count(*) filter (where "searchVector" is not null) as with_vector from "Post";'
